<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cafe Scanner - CM26</title>
    <link rel="stylesheet" href="/pwa/shared/theme.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c6fb6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-title-row">
                <a href="/" class="btn btn-sm btn-white back-btn">← Back</a>
                <h1>☕ Cafe Scanner</h1>
            </div>
            <div class="header-actions">
                <div id="connection-status" class="status-indicator online">Online</div>
                <button id="logout-btn" class="btn btn-sm btn-white logout-btn" style="display:none;">Log Out</button>
            </div>
        </div>
        <div class="header-subtitle">
            <span id="user-display">Volunteer sign-in required</span>
            <span id="sync-status">Cache not loaded</span>
        </div>

        <!-- Meal + Date selector row -->
        <div class="meal-selector">
            <select id="current-meal-select">
                <option value="auto">🕒 Auto-detect</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="supper">Supper</option>
            </select>
            <input type="date" id="date-override" title="Override date for ticket lookup">
            <div id="current-active-meal" class="active-meal-badge">Detecting…</div>
        </div>
    </header>

    <div id="auth-screen" class="auth-screen">
        <form id="login-form" class="auth-card">
            <h2>Volunteer Login</h2>
            <p>Sign in before scanning or redeeming tickets.</p>
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button type="submit" class="btn btn-primary full-width">Sign In</button>
            <div id="login-error" class="error-msg auth-error" style="display:none;"></div>
        </form>
    </div>

    <main>
        <!-- CAMERA SCANNER -->
        <div id="scanner-section">
            <div id="reader" style="display:none;"></div>
            <button id="start-scan-btn" class="btn btn-primary btn-large">📷 Start Camera</button>
            <button id="stop-scan-btn" class="btn btn-secondary" style="display:none;">⏹ Stop Camera</button>
        </div>

        <!-- MANUAL / NAME LOOKUP -->
        <div class="lookup-section">
            <!-- Lookup mode tabs -->
            <div class="lookup-tabs">
                <button class="tab-btn active" id="lt-id-btn"   onclick="switchLookupTab('id')">By ID / Ticket</button>
                <button class="tab-btn"         id="lt-name-btn" onclick="switchLookupTab('name')">By Name</button>
            </div>

            <!-- Panel: By ID or ticket -->
            <div id="lookup-id-panel" class="lookup-panel">
                <div class="lookup-row">
                    <input type="text" id="manual-input" placeholder="Reg ID (CM26-0001) or Ticket (MT-xxxxx)" autocomplete="off">
                    <button id="manual-lookup-btn" class="btn btn-secondary lookup-btn">🔍</button>
                </div>
            </div>

            <!-- Panel: By Name -->
            <div id="lookup-name-panel" class="lookup-panel" style="display:none;">
                <div class="name-inputs">
                    <input type="text" id="name-first-input" placeholder="First Name" autocomplete="given-name">
                    <input type="text" id="name-last-input"  placeholder="Last Name"  autocomplete="family-name">
                </div>
                <button id="name-lookup-btn" class="btn btn-secondary">🔍 Search by Name</button>

                <!-- Name search results list -->
                <div id="name-search-results" style="display:none;"></div>
            </div>
        </div>

        <!-- GUEST RESULT CARD -->
        <div id="result-card" class="card" style="display:none;">
            <div class="card-header">
                <div>
                    <h2 id="guest-name">Guest Name</h2>
                    <span id="reg-id-display" class="badge">ID</span>
                </div>
                <div id="card-loading" class="card-spinner" style="display:none;">
                    <div class="spinner-ring-sm"></div>
                </div>
            </div>

            <div class="card-body">
                <div id="dietary-warning" class="warning-box" style="display:none;">
                    ⚠️ <span id="dietary-text"></span>
                </div>

                <div class="ticket-stats">
                    <div class="stat-box">
                        <div class="stat-label">Tickets Found</div>
                        <div class="stat-value" id="tickets-found">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Already Used</div>
                        <div class="stat-value" id="tickets-used">0</div>
                    </div>
                </div>

                <div id="action-area" class="action-area">
                    <h3>Redeem for <span id="action-meal-name">Current Meal</span></h3>
                    <div id="redeem-buttons" class="grid-buttons"></div>
                    <div id="redeem-message" class="message"></div>
                </div>
            </div>

            <button id="close-card-btn" class="btn btn-outline">Close / Next Guest</button>
        </div>

        <!-- OFFLINE QUEUE BAR -->
        <div id="offline-queue-bar" class="queue-bar" style="display:none;">
            <span>⚠️ <b id="queue-count">0</b> offline scans pending</span>
            <button id="sync-btn" class="btn btn-sm btn-white">Sync Now</button>
        </div>

        <!-- ACTIVITY LOG -->
        <div class="activity-log">
            <h3>Recent Activity</h3>
            <ul id="activity-list"></ul>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Error', err));
        }
    </script>
</body>
</html>
