name: Deploy to Apps Script
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write service account key
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/sa-key.json

      - name: Generate clasp credentials
        run: |
          pip install google-auth --quiet
          ACCESS_TOKEN=$(python3 -c "
          import google.oauth2.service_account as sa
          import google.auth.transport.requests as req
          creds = sa.Credentials.from_service_account_file('/tmp/sa-key.json', scopes=['https://www.googleapis.com/auth/script.projects'])
          creds.refresh(req.Request())
          print(creds.token)
          ")
          echo "{\"token\":{\"access_token\":\"$ACCESS_TOKEN\",\"token_type\":\"Bearer\"}}" > ~/.clasprc.json

      - name: Inject Script ID into clasp config
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: envsubst < .clasp.json > .clasp.json.tmp && mv .clasp.json.tmp .clasp.json

      - name: Push to Apps Script
        run: clasp push -f
