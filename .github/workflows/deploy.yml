name: Deploy to Apps Script
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Generate clasp credentials
        run: |
          # Write the entire clasprc.json safely from a single secret
          cat > ~/.clasprc.json << 'EOF'
          ${{ secrets.CLASPRC_JSON }}
          EOF

      - name: Inject Script ID into clasp config
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: envsubst < .clasp.json > .clasp.json.tmp && mv .clasp.json.tmp .clasp.json

      - name: Push to Apps Script
        run: clasp push -f
