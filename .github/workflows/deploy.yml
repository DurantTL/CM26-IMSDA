name: Deploy to Apps Script
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write service account key
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/sa-key.json

      - name: Generate clasp credentials
        env:
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
        run: |
          cat > ~/.clasprc.json << EOF
          {
            "token": {
              "access_token": "",
              "refresh_token": "$CLASP_REFRESH_TOKEN",
              "scope": "https://www.googleapis.com/auth/script.projects",
              "token_type": "Bearer",
              "expiry_date": 1
            },
            "oauth2ClientSettings": {
              "clientId": "$CLASP_CLIENT_ID",
              "clientSecret": "$CLASP_CLIENT_SECRET",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": false
          }
          EOF
          echo "File written, checking refresh_token is present:"
          cat ~/.clasprc.json | grep -o '"refresh_token":"[^"]*"' | cut -c1-30

      - name: Inject Script ID into clasp config
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: envsubst < .clasp.json > .clasp.json.tmp && mv .clasp.json.tmp .clasp.json

      - name: Push to Apps Script
        run: clasp push -f
