name: Deploy to Apps Script
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write service account key
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/sa-key.json

      - name: Generate clasp credentials
        run: |
          pip install google-auth --quiet
          python3 << 'EOF'
          import json
          import os
          import google.oauth2.service_account as sa
          import google.auth.transport.requests as req

          # Load service account to get client_id
          with open('/tmp/sa-key.json') as f:
            sa_data = json.load(f)

          creds = sa.Credentials.from_service_account_file(
            '/tmp/sa-key.json',
            scopes=['https://www.googleapis.com/auth/script.projects']
          )
          creds.refresh(req.Request())

          clasprc = {
            "token": {
              "access_token": creds.token,
              "refresh_token": "",
              "scope": "https://www.googleapis.com/auth/script.projects",
              "token_type": "Bearer",
              "expiry_date": 9999999999999
            },
            "oauth2ClientSettings": {
              "clientId": sa_data.get("client_id", ""),
              "clientSecret": "",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": False
          }

          home = os.path.expanduser('~')
          path = os.path.join(home, '.clasprc.json')
          with open(path, 'w') as f:
            json.dump(clasprc, f)
          print("Written successfully, client_id:", sa_data.get("client_id", "NOT FOUND"))
          EOF

      - name: Inject Script ID into clasp config
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: envsubst < .clasp.json > .clasp.json.tmp && mv .clasp.json.tmp .clasp.json

      - name: Push to Apps Script
        run: clasp push -f
