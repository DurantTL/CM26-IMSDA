name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main # Or your primary branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Setup Clasp Credentials
        run: |
          # Write the authentication token from GitHub Secrets
          cat > ~/.clasprc.json << EOF
          ${{ secrets.CLASPRC_JSON }}
          EOF

      - name: Inject Script ID
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          # Replace the ${SCRIPT_ID} placeholder in .clasp.json with the actual secret
          envsubst < .clasp.json > .clasp.json.tmp && mv .clasp.json.tmp .clasp.json

      - name: Push Code to Apps Script
        run: clasp push -f
